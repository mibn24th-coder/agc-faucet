<!DOCTYPE html>
<html>
<head>
<title>AGC Faucet</title>

<script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding-top:80px;
}

.container{
background:#1e293b;
width:400px;
margin:auto;
padding:30px;
border-radius:12px;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

</style>

</head>

<body>

<div class="container">

<h1>AGC Faucet</h1>
<p>Claim 0.1 AGC every 24 hours</p>

<button onclick="connectWallet()">Connect Wallet</button>
<button onclick="claim()">Claim AGC</button>

<p id="wallet"></p>
<p id="status"></p>

</div>

<script>

let web3;
let account;

const faucetAddress = "PASTE_FAUCET_CONTRACT_ADDRESS";

const faucetABI = [
{
"inputs":[],
"name":"claim",
"outputs":[],
"stateMutability":"nonpayable",
"type":"function"
}
];

let faucet;

async function connectWallet(){

if(window.ethereum){

web3 = new Web3(window.ethereum);

await ethereum.request({method:'eth_requestAccounts'});

let accounts = await web3.eth.getAccounts();

account = accounts[0];

document.getElementById("wallet").innerHTML =
"Wallet: " + account;

faucet = new web3.eth.Contract(
faucetABI,
faucetAddress
);

}

}

async function claim(){

document.getElementById("status").innerHTML="Processing...";

try{

await faucet.methods.claim().send({from:account});

document.getElementById("status").innerHTML =
"Success! 0.1 AGC received";

}catch(e){

document.getElementById("status").innerHTML =
"Error or wait 24 hours";

}

}

</script>

</body>
</html>
