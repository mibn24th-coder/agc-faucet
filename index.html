<!DOCTYPE html>
<html>
<head>
<title>AGC Faucet</title>
<script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>

<style>
body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding-top:80px;
}

.container{
background:#1e293b;
width:400px;
margin:auto;
padding:30px;
border-radius:12px;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.info{
margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>AGC Faucet</h1>
<p>Claim 0.1 AGC every 24 hours</p>

<button onclick="connectWallet()">Connect Wallet</button>
<button onclick="claim()">Claim AGC</button>

<div class="info">
<p id="wallet"></p>
<p id="balance"></p>
<p id="status"></p>
</div>

</div>

<script>

let web3;
let account;

const tokenAddress = "0x9bfaC367F4C025f1883511A36a51ed69c7Be08C9";

const abi = [
{
"constant":true,
"inputs":[{"name":"owner","type":"address"}],
"name":"balanceOf",
"outputs":[{"name":"","type":"uint256"}],
"type":"function"
},
{
"constant":false,
"inputs":[
{"name":"to","type":"address"},
{"name":"value","type":"uint256"}
],
"name":"transfer",
"outputs":[{"name":"","type":"bool"}],
"type":"function"
}
];

let contract;

async function connectWallet(){

if(window.ethereum){

web3 = new Web3(window.ethereum);

await ethereum.request({method:'eth_requestAccounts'});

let accounts = await web3.eth.getAccounts();

account = accounts[0];

document.getElementById("wallet").innerHTML = "Wallet: " + account;

contract = new web3.eth.Contract(abi,tokenAddress);

getBalance();

}

}

async function getBalance(){

let bal = await contract.methods.balanceOf(account).call();

bal = web3.utils.fromWei(bal);

document.getElementById("balance").innerHTML = "AGC Balance: "+bal;

}

function canClaim(){

let last = localStorage.getItem("lastClaim");

if(!last) return true;

let now = Date.now();

let diff = now - last;

return diff > 86400000;

}

async function claim(){

if(!canClaim()){

document.getElementById("status").innerHTML="Come back after 24 hours";

return;

}

document.getElementById("status").innerHTML="Processing...";

let amount = web3.utils.toWei("0.1");

await contract.methods.transfer(account,amount).send({from:account});

localStorage.setItem("lastClaim",Date.now());

document.getElementById("status").innerHTML="Success! 0.1 AGC received";

getBalance();

}

</script>

</body>
</html>
