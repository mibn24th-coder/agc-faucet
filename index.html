<!DOCTYPE html>
<html>

<head>
<title>AGC Faucet</title>
<script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
</head>

<body>

<h1>AGC Faucet</h1>
<p>Welcome to AGC Testnet Faucet</p>

<button onclick="connectWallet()">Connect Wallet</button>
<button onclick="claimToken()">Claim AGC</button>

<p id="wallet"></p>
<p id="status"></p>

<script>

async function connectWallet() {
if (window.ethereum) {
const accounts = await ethereum.request({ method: 'eth_requestAccounts' });
document.getElementById("wallet").innerText = "Wallet: " + accounts[0];
} else {
alert("Please install MetaMask");
}
}

async function claimToken() {

if (!window.ethereum) {
alert("Please install MetaMask");
return;
}

const web3 = new Web3(window.ethereum);

const accounts = await web3.eth.getAccounts();

document.getElementById("status").innerText = "Sending AGC...";

const contractAddress = "0x9bfaC367F4C025f1883511A36a51ed69c7Be08C9";

await web3.eth.sendTransaction({
from: accounts[0],
to: contractAddress,
value: 0
});

document.getElementById("status").innerText = "AGC Sent!";
}

</script>

</body>
</html>
